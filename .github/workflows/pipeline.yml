name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE.md'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Test
        run: cargo test --verbose

  version:
    name: Versioning
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Compute Version
        id: compute
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | cut -d '"' -f2)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          NEW_VERSION="$MAJOR.$MINOR.${{ github.run_number }}"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

  build-linux:
    name: Build / Linux
    if: github.event_name == 'push'
    needs:
      - test
      - version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Apply Version to Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Setup Docker
        uses: docker/setup-buildx-action@v4

      - name: Build Docker
        run: |
          docker build -f linux.Dockerfile -t eliteassist-builder .
          # Extract the built artifacts from the container
          docker create --name temp-container eliteassist-builder
          mkdir -p ./artifacts
          docker cp temp-container:/app/target/release ./artifacts
          docker rm temp-container

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EliteAssist-linux
          path: ./artifacts/release/EliteAssist

  build-windows:
    name: Build / Windows
    if: github.event_name == 'push'
    needs:
      - test
      - version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Apply Version to Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Setup Docker
        uses: docker/setup-buildx-action@v4

      - name: Build Docker
        run: |
          docker build -f windows.Dockerfile -t eliteassist-windows-builder .
          docker create --name temp-container eliteassist-windows-builder
          mkdir -p ./artifacts/windows
          docker cp temp-container:/app/target/x86_64-pc-windows-gnu/release/EliteAssist.exe ./artifacts/windows/EliteAssist.exe
          docker rm temp-container

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EliteAssist-windows
          path: ./artifacts/windows/EliteAssist.exe

  build-macos:
    name: Build / macOS
    if: github.event_name == 'push'
    needs:
      - test
      - version
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Apply Version to Cargo.toml
        run: |
          sed -i '' "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --verbose

      - name: Package .app bundle
        run: |
          APP_DIR="dist/EliteAssist.app"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"
          cp ./target/release/EliteAssist "${APP_DIR}/Contents/MacOS/EliteAssist"
          chmod +x "${APP_DIR}/Contents/MacOS/EliteAssist"
          cat > "${APP_DIR}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>EliteAssist</string>
            <key>CFBundleDisplayName</key>
            <string>EliteAssist</string>
            <key>CFBundleIdentifier</key>
            <string>com.eliteassist.app</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>EliteAssist</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF

      - name: Create .dmg installer
        run: |
          mkdir -p dist/dmg
          cp -R dist/EliteAssist.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "EliteAssist" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            "dist/EliteAssist-${VERSION}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EliteAssist-macos
          path: ./dist/EliteAssist-${{ env.VERSION }}.dmg

  publish:
    name: Publish
    if: github.event_name == 'push'
    needs:
      - build-linux
      - build-windows
      - build-macos
      - version
    runs-on: ubuntu-latest
    environment: beta
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: EliteAssist-linux
          path: dist/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: EliteAssist-windows
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: EliteAssist-macos
          path: dist/macos

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/linux/EliteAssist
            dist/windows/EliteAssist.exe
            dist/macos/*.dmg
          prerelease: true
          generate_release_notes: true
          tag_name: v${{ env.VERSION }}